spring.application.name=spring-ai-demo

# Force servlet web app even though WebFlux is on the classpath (needed by the MCP client)
spring.main.web-application-type=servlet

# ---- OpenAI ----
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.chat.options.model=gpt-4o-mini
spring.ai.openai.embedding.options.model=text-embedding-3-small

# ---- Metrics / Actuator ----
spring.ai.metrics.enabled=true
management.endpoints.web.exposure.include=health,info,metrics,prometheus

# ---- Logging ----
logging.level.org.springframework.ai=TRACE
logging.level.org.springframework.ai.chat.client.advisor=DEBUG
logging.level.org.springframework.ai.mcp=DEBUG

# ---- Chroma vector store ----
spring.ai.vectorstore.chroma.client.host=http://localhost
spring.ai.vectorstore.chroma.client.port=8000
# true so the WineReviews collection is created on startup and the loader can write to it
spring.ai.vectorstore.chroma.initialize-schema=true
spring.ai.vectorstore.chroma.collection-name=WineReviews
spring.ai.vectorstore.chroma.database-name=default_database
spring.ai.vectorstore.chroma.tenant-name=default_tenant

# ---- Sample data loader ----
# true  -> load data/wine-reviews.json into Chroma on startup
# false -> load on demand via POST /ai/chroma/load
app.wine.load-on-startup=false

# ---- MCP client (streamable-http) ----
# Disabled by default so the app boots without an MCP server running.
# Set spring.ai.mcp.client.enabled=true and start your MCP server on :8001 to use /ai/mcp/**
spring.ai.mcp.client.enabled=false
spring.ai.mcp.client.initialized=false
spring.ai.mcp.client.type=SYNC
spring.ai.mcp.client.streamable-http.enabled=true
spring.ai.mcp.client.streamable-http.connections.mcp_server.url=http://localhost:8001
spring.ai.mcp.client.tool-callbacks-enabled=true

